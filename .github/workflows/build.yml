name: Build App

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build DocDash.app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build universal app bundle
        run: |
          DOCDASH_VERSION="${{ steps.version.outputs.version }}" ./scripts/make_app.sh dist --universal

      - name: Smoke test (fixture docset + headless search)
        run: |
          ./pipelines/fixture/build.sh /tmp/fixture-docsets
          DOCDASH_DOCSETS_DIR=/tmp/fixture-docsets \
            ./dist/DocDash.app/Contents/MacOS/DocDash --selftest \
            --query greet --expect-docsets 1 --expect-results

      - name: Zip app bundle
        run: ditto -c -k --keepParent dist/DocDash.app dist/DocDash.zip

      - uses: actions/upload-artifact@v4
        with:
          name: DocDash
          path: dist/DocDash.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/DocDash.zip \
            --title "DocDash $GITHUB_REF_NAME" \
            --notes "Universal (arm64 + x86_64) macOS app bundle, ad-hoc signed. Internal use.

          Unzip and run. On first launch, right-click ▸ Open (unsigned internal build), then install docsets via Docsets ▸ Manage Docsets…"
