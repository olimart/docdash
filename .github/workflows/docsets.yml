name: Build Docsets

on:
  workflow_dispatch:
    inputs:
      ruby_versions:
        description: "Ruby versions to build (space-separated, empty to skip)"
        default: "3.4.10 4.0.5"
      rails_versions:
        description: "Rails versions to build (space-separated, empty to skip)"
        default: "8.0.5 8.1.3"

permissions:
  contents: write

jobs:
  docsets:
    name: Generate docsets + catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Install latest RDoc
        run: gem install rdoc --no-document

      - name: Build docsets
        run: |
          mkdir -p build/docsets dist
          for version in ${{ inputs.ruby_versions }}; do
            ./pipelines/ruby/build.sh "$version" build/docsets
          done
          for version in ${{ inputs.rails_versions }}; do
            ./pipelines/rails/build.sh "$version" build/docsets
          done
          for docset in build/docsets/*/; do
            ./pipelines/package.sh "$docset" dist
          done
          ls -lh dist

      - name: Generate catalog.json
        run: ruby pipelines/make_catalog.rb dist "$GITHUB_REPOSITORY" docsets

      - name: Publish to the "docsets" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view docsets --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release create docsets --repo "$GITHUB_REPOSITORY" \
              --title "Docsets" \
              --notes "Docset archives and catalog.json consumed by DocDash (Docsets ▸ Manage Docsets…). Regenerated by the Build Docsets workflow." \
              --latest=false
          fi
          gh release upload docsets dist/* --repo "$GITHUB_REPOSITORY" --clobber
